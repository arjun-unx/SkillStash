<div class="flex flex-col items-center rounded-2xl border border-dashed border-line-strong bg-surface-elevated/40 px-8 py-14 text-center">
  <span class="material-symbols-outlined mb-4 text-5xl text-slate-600">{{ icon }}</span>
  <h3 class="text-lg font-semibold text-white">{{ title }}</h3>
  <p *ngIf="message" class="mt-2 max-w-md text-sm text-slate-400">{{ message }}</p>
  <div class="mt-6 flex flex-wrap justify-center gap-3">
    <ng-content></ng-content>
  </div>
</div>
