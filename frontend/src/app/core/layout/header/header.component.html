<header
  class="z-40 flex h-14 shrink-0 items-center gap-4 border-b border-line bg-surface-elevated/95 px-4 backdrop-blur-xl sm:px-6">
  <div class="flex min-w-0 flex-1 items-center gap-2 lg:hidden">
    <a routerLink="/feed" class="text-sm font-semibold text-white">SkillStash</a>
  </div>
  <div class="hidden items-center gap-2 text-sm text-slate-500 lg:flex">
    <span class="font-mono">/</span>
    <span class="font-medium text-slate-300">Workspace</span>
  </div>

  <div class="ml-auto flex items-center gap-2 sm:gap-3">
    <ng-container *ngIf="user$ | async as user; else anon">
      <a
        [routerLink]="['/u', user.userName]"
        class="flex items-center gap-2 rounded-full border border-line bg-surface-raised/60 py-1 pl-1 pr-3 text-sm text-slate-200 transition hover:border-line-strong hover:bg-surface-overlay">
        <span
          class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-violet-600 to-cyan-500 text-xs font-semibold text-white">
          {{ user.displayName.charAt(0) }}
        </span>
        <span class="hidden max-w-[120px] truncate sm:inline">{{ user.displayName }}</span>
      </a>
      <button type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-lg text-slate-400 transition hover:bg-white/5 hover:text-white" (click)="logout()" aria-label="Sign out">
        <span class="material-symbols-outlined text-[20px]">logout</span>
      </button>
    </ng-container>
    <ng-template #anon>
      <a routerLink="/auth/login" class="rounded-xl px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-white/5 hover:text-white">Sign in</a>
      <a routerLink="/auth/register" class="rounded-xl bg-violet-600 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-violet-600/25 transition hover:bg-violet-500">Get started</a>
    </ng-template>
  </div>
</header>
