<section class="mx-auto w-full max-w-xl px-4 py-8 sm:px-6 lg:px-8">
  <ps-loading-spinner *ngIf="loading"></ps-loading-spinner>

  <ng-container *ngIf="!loading && skill as p">
    <ps-skill-card
      [skill]="p"
      [canEdit]="isMine"
      (likeToggled)="toggleLike($event)"
      (bookmarkToggled)="toggleBookmark($event)"
      (copyClicked)="copy($event)"
      (commentClicked)="comment($event)"
      (shareClicked)="share($event)"
      (editClicked)="edit()">
    </ps-skill-card>

    <div class="mt-6 flex flex-wrap items-center gap-3 text-xs text-slate-500">
      <span class="font-mono">Created {{ p.createdAtUtc | psTimeAgo }}</span>
      <span *ngIf="p.updatedAtUtc" class="font-mono">· Updated {{ p.updatedAtUtc | psTimeAgo }}</span>
      <span class="flex-1"></span>
      <button *ngIf="isMine" type="button" (click)="remove()" [class]="ui.btnDanger">
        <span class="material-symbols-outlined text-[20px]">delete</span>
        Delete skill
      </button>
    </div>

    <section id="comments" class="mt-12 space-y-4 scroll-mt-24 rounded-3xl border border-line/80 bg-surface-elevated/50 p-5 backdrop-blur-md sm:p-6">
      <div class="flex items-center justify-between gap-3">
        <h2 class="text-sm font-semibold text-white">Comments</h2>
        <span class="font-mono text-xs text-slate-500">{{ comments.length }} shown</span>
      </div>

      <div *ngIf="auth.isAuthenticated" class="space-y-2">
        <label class="sr-only" for="comment-box">Add a comment</label>
        <textarea
          id="comment-box"
          [(ngModel)]="commentBody"
          rows="3"
          placeholder="Share feedback or how you used this skill…"
          class="w-full rounded-2xl border border-line bg-surface-raised/80 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-600 focus:border-violet-500/50 focus:outline-none focus:ring-1 focus:ring-violet-500/30"></textarea>
        <button type="button" [class]="ui.btnPrimary" [disabled]="!commentBody.trim()" (click)="submitComment()">Post comment</button>
      </div>
      <p *ngIf="!auth.isAuthenticated" class="text-sm text-slate-400">
        <a routerLink="/auth/login" class="text-violet-300 hover:underline">Log in</a>
        to join the discussion.
      </p>

      <ps-loading-spinner *ngIf="loadingComments"></ps-loading-spinner>

      <ul *ngIf="!loadingComments && comments.length" class="space-y-3">
        <li
          *ngFor="let c of comments"
          class="rounded-2xl border border-line/60 bg-surface-overlay/40 px-4 py-3">
          <div class="flex flex-wrap items-baseline justify-between gap-2">
            <span class="text-sm font-medium text-slate-100">{{ c.authorDisplayName }}</span>
            <span class="font-mono text-[11px] text-slate-500">{{ c.createdAtUtc | psTimeAgo }}</span>
          </div>
          <p class="mt-1 whitespace-pre-wrap text-sm leading-relaxed text-slate-300">{{ c.body }}</p>
        </li>
      </ul>

      <ps-empty-state
        *ngIf="!loadingComments && !comments.length"
        icon="chat"
        title="Start the thread"
        message="Be the first to leave a note on this skill.">
      </ps-empty-state>
    </section>
  </ng-container>
</section>
