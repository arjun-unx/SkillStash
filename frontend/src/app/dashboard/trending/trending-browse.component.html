<section class="mx-auto w-full max-w-5xl px-4 py-8 sm:px-6 lg:max-w-6xl lg:px-8" *ngIf="provider as pv">
  <nav class="mb-6 text-xs font-mono text-slate-500">
    <a routerLink="/trending" class="text-slate-400 transition hover:text-white hover:no-underline">Trending</a>
    <span class="mx-2 text-slate-600">/</span>
    <span class="text-slate-300">{{ pv.name }}</span>
  </nav>

  <header class="sticky top-0 z-20 -mx-4 mb-8 space-y-4 border-b border-line/80 bg-surface/95 px-4 pb-4 pt-2 backdrop-blur-xl sm:-mx-6 sm:px-6 lg:-mx-8 lg:px-8">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div class="space-y-2">
        <h1 class="text-2xl font-semibold text-white sm:text-3xl">{{ pv.name }} skills</h1>
        <p class="max-w-2xl text-sm text-slate-400">{{ pv.description }}</p>
        <p class="font-mono text-[11px] text-slate-600" *ngIf="pv.lastSyncedAtUtc">
          Catalog updated {{ pv.lastSyncedAtUtc | psTimeAgo }} · {{ totalCount }} skills indexed
        </p>
      </div>
      <a
        routerLink="/trending"
        class="inline-flex items-center gap-2 self-start rounded-xl border border-line px-3 py-2 text-xs font-medium text-slate-300 transition hover:border-line-strong hover:text-white hover:no-underline">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        All providers
      </a>
    </div>

    <div class="relative">
      <span class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-[20px] text-slate-500">search</span>
      <input
        type="search"
        [formControl]="searchCtrl"
        placeholder="Search this catalog…"
        class="w-full rounded-xl border border-line bg-surface-raised/80 py-2.5 pl-10 pr-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-violet-500/60 focus:outline-none focus:ring-2 focus:ring-violet-500/20" />
    </div>

    <div class="flex flex-wrap gap-2">
      <button
        *ngFor="let s of sortOptions"
        type="button"
        (click)="setSort(s.id)"
        [class]="
          sortMode === s.id
            ? 'rounded-full bg-violet-500/25 px-3 py-1.5 text-xs font-semibold text-violet-100 ring-1 ring-violet-400/40'
            : 'rounded-full border border-line bg-surface-elevated/60 px-3 py-1.5 text-xs text-slate-400 transition hover:text-white'
        ">
        {{ s.label }}
      </button>
    </div>

    <div class="flex gap-2 overflow-x-auto pb-1" style="-webkit-overflow-scrolling: touch">
      <button
        *ngFor="let role of roleFilters"
        type="button"
        (click)="toggleRole(role)"
        [class]="
          isRoleOn(role)
            ? 'shrink-0 rounded-full bg-cyan-500/20 px-3 py-1 text-[11px] font-semibold text-cyan-100 ring-1 ring-cyan-400/35'
            : 'shrink-0 rounded-full border border-line/80 bg-surface-overlay/50 px-3 py-1 text-[11px] text-slate-400 transition hover:text-white'
        ">
        {{ role }}
      </button>
    </div>
  </header>

  <ps-loading-spinner *ngIf="loading"></ps-loading-spinner>

  <ng-container *ngIf="!loading">
    <ng-container *ngIf="grouped.length; else empty">
      <div class="space-y-12">
        <section *ngFor="let g of grouped" class="space-y-4">
          <div class="flex items-center gap-2">
            <h2 class="text-sm font-semibold text-white">{{ g.role }}</h2>
            <span class="font-mono text-[11px] text-slate-500">{{ g.items.length }} loaded</span>
          </div>
          <div class="flex flex-col gap-6">
            <ps-trending-skill-card
              *ngFor="let p of g.items; trackBy: trackById"
              [skill]="p"
              (copyClicked)="copy($event)"
              (bookmarkToggled)="toggleBookmark($event)"
              (shareClicked)="share($event)"
              (useClicked)="useSkill($event)">
            </ps-trending-skill-card>
          </div>
        </section>
      </div>

      <div #sentinel class="flex h-14 items-center justify-center py-8">
        <span *ngIf="loadingMore" class="font-mono text-xs text-slate-500">Loading more…</span>
        <span *ngIf="!hasNext && !loadingMore" class="font-mono text-xs text-slate-600">End of catalog</span>
      </div>
    </ng-container>

    <ng-template #empty>
      <ps-empty-state
        icon="cloud_off"
        title="No skills synced yet"
        message="Hit Refresh catalog on the Trending home page to pull skills from public GitHub sources.">
        <a routerLink="/trending" class="rounded-xl bg-violet-600 px-4 py-2 text-sm font-semibold text-white hover:no-underline">Go to Trending</a>
      </ps-empty-state>
    </ng-template>
  </ng-container>
</section>
